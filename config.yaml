# Cogent configuration — centralised settings for the AI coworker.
#
# Layers (later overrides earlier):
#   1. This file
#   2. Environment variables (COGENT_* / backend/.env keys)
#   3. Runtime overrides (cogent_config.set_override)
#
# See cogent/backend/cogent_config.py for the loader.

model:
  # Default LLM — OpenAI-compatible chat completions
  provider: opencode-zen
  base_url: https://opencode.ai/zen/v1/chat/completions
  default: deepseek-v4-flash-free
  # api_key: read from OPENCODE_API_KEY env var

rate_limit:
  enabled: true
  min_delay_ms: 5000          # Minimum gap between requests (5 s)
  max_delay_ms: 7000          # Maximum gap (7 s) — randomized to avoid thundering herd

# Virtual Provider — fallback chain when a provider returns 429 Rate Limited.
# Providers are tried in priority order (lower = first). If one hits a 429,
# Cogent automatically falls back to the next in the chain and reports the switch.
providers:
  - name: opencode-zen
    base_url: https://opencode.ai/zen/v1/chat/completions
    model: deepseek-v4-flash-free
    api_key_env: OPENCODE_API_KEY
    priority: 1
  - name: kilocode
    base_url: https://api.kilo.ai/api/gateway/chat/completions
    model: nvidia/nemotron-3-ultra-550b-a55b:free
    api_key_env: KILOCODE_API_KEY
    priority: 2
  - name: openrouter
    base_url: https://openrouter.ai/api/v1/chat/completions
    model: openrouter/owl-alpha
    api_key_env: OPENROUTER_API_KEY
    priority: 3
  - name: ollama-cloud
    library: ollama-cloud
    base_url: https://cloud.ollama.ai
    model: glm-5.2:cloud
    api_key_env: OLLAMA_API_KEY
    priority: 4

agent:
  max_turns: 15               # max tool-using turns per message
  max_iterations: 15         # max Plan→Execute→Verify cycles
  verbose: false             # when true, narrate every tool call
  reasoning_effort: medium    # minimal | low | medium | high

database:
  mongo_url: mongodb://localhost:27017   # or COGENT_MONGO_URL env
  db_name: cogent                        # or COGENT_DB_NAME env

workspace:
  default: default

logging:
  level: INFO                 # DEBUG | INFO | WARNING | ERROR
  dir: ""                     # empty = backend/logs/; override via COGENT_LOG_DIR

web:
  search_backend: firecrawl
  scrape_backend: firecrawl
  # firecrawl_api_key: read from FIRECRAWL_API_KEY env var
  # firecrawl_base_url: read from FIRECRAWL_BASE_URL env var

checkpoints:
  enabled: true
  max_snapshots: 10

hooks:
  auto_discover: true         # scan backend/hooks/*.py on startup

gateway:
  enabled: true
  delivery_targets: [sse]      # sse | webhook | log
  heartbeat_interval: 30        # seconds

acp:
  enabled: true
  port: 7999                    # ACP listener port (future)

skills:
  auto_discover: true           # scan .cogent/skills/ on startup
  optional_dir: optional-skills # path relative to project root

plugins:
  enabled: true
  dir: plugins                  # path relative to project root

datagen:
  enabled: false
  output_dir: memory/research/
  max_items: 100
headroom:
  enabled: true
  compression_level: auto  # off | auto | aggressive
  output_shaper: false     # also trim output tokens (proxy mode)

mcp:
  enabled: true
  servers_dir: optional-mcps/
  registry_url: https://github.com/mcp
  auto_sync_interval_hours: 24
